name: Daily Energy Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send Free Daily Energy Reminder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          TODAY=$(TZ="Asia/Kuala_Lumpur" date +"%Y年%-m月%-d日")
          WEEKDAY_NUM=$(TZ="Asia/Kuala_Lumpur" date +"%u")
          DAY=$(TZ="Asia/Kuala_Lumpur" date +"%-d")

          case "$WEEKDAY_NUM" in
            1) WEEKDAY_CN="星期一" ;;
            2) WEEKDAY_CN="星期二" ;;
            3) WEEKDAY_CN="星期三" ;;
            4) WEEKDAY_CN="星期四" ;;
            5) WEEKDAY_CN="星期五" ;;
            6) WEEKDAY_CN="星期六" ;;
            7) WEEKDAY_CN="星期日" ;;
          esac

          case "$((DAY % 7))" in
            0)
              CORE="能量避坑指南：今天少说多做，别急着解释，行动比争辩更有力量。"
              DO1="整理手上任务"
              DO2="主动跟进客户"
              AVOID1="情绪化回复"
              AVOID2="临时乱改计划"
              NUM="8"
              COLOR="金色"
              ZODIAC="龙、猴"
              ;;
            1)
              CORE="能量避坑指南：今天适合稳住节奏，不求快，只求不乱。"
              DO1="完成一件拖延事项"
              DO2="检查财务细节"
              AVOID1="冲动消费"
              AVOID2="答应太多事情"
              NUM="3"
              COLOR="绿色"
              ZODIAC="虎、兔"
              ;;
            2)
              CORE="能量避坑指南：今天人际磁场较强，贵人来自主动联系。"
              DO1="联系重要客户"
              DO2="表达感谢"
              AVOID1="冷处理关系"
              AVOID2="说话太直接伤人"
              NUM="6"
              COLOR="白色"
              ZODIAC="鸡、牛"
              ;;
            3)
              CORE="能量避坑指南：今天适合清理杂乱，环境顺了，心也会顺。"
              DO1="整理桌面"
              DO2="处理旧文件"
              AVOID1="拖延小事"
              AVOID2="把问题越堆越多"
              NUM="9"
              COLOR="红色"
              ZODIAC="马、蛇"
              ;;
            4)
              CORE="能量避坑指南：今天财气在细节里，别贪大，先守住。"
              DO1="核对账目"
              DO2="规划开销"
              AVOID1="听信小道消息"
              AVOID2="冒险投资"
              NUM="2"
              COLOR="黄色"
              ZODIAC="狗、羊"
              ;;
            5)
              CORE="能量避坑指南：今天适合曝光自己，好机会来自被看见。"
              DO1="发布内容"
              DO2="分享观点"
              AVOID1="自我怀疑"
              AVOID2="躲在幕后"
              NUM="1"
              COLOR="蓝色"
              ZODIAC="鼠、猪"
              ;;
            6)
              CORE="能量避坑指南：今天要养气，不要硬碰硬，退一步反而赢。"
              DO1="休息调整"
              DO2="陪伴家人"
              AVOID1="争输赢"
              AVOID2="过度消耗"
              NUM="5"
              COLOR="咖啡色"
              ZODIAC="牛、龙"
              ;;
          esac

          MESSAGE="📅 ${TODAY} (${WEEKDAY_CN}) | 每日能量提醒

✨ 今日核心启示 ：
${CORE}

🎯 今日宜做 ：
• ${DO1}
• ${DO2}

⚠️ 今日避坑 ：
• ${AVOID1}
• ${AVOID2}

🔢 今日幸运磁场 ：
• 数字：${NUM}
• 颜色：${COLOR}
• 旺生肖：${ZODIAC}

---
🔗 想一对一算运势？点击咨询王老师：
👉 https://wa.me/60167272735"

          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
