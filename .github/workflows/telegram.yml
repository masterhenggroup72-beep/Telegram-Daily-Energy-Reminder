name: Daily Energy Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'   # Malaysia time 8:30 AM

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Generate and Send Telegram Message
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "BOT_TOKEN is empty"
            exit 1
          fi

          if [ -z "$CHAT_ID" ]; then
            echo "CHAT_ID is empty"
            exit 1
          fi

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is empty"
            exit 1
          fi

          TODAY=$(TZ="Asia/Kuala_Lumpur" date +"%Y年%-m月%-d日")
          WEEKDAY=$(TZ="Asia/Kuala_Lumpur" date +"%u")

          case "$WEEKDAY" in
            1) WEEKDAY_CN="星期一" ;;
            2) WEEKDAY_CN="星期二" ;;
            3) WEEKDAY_CN="星期三" ;;
            4) WEEKDAY_CN="星期四" ;;
            5) WEEKDAY_CN="星期五" ;;
            6) WEEKDAY_CN="星期六" ;;
            7) WEEKDAY_CN="星期日" ;;
          esac

          PROMPT="你是一位说话直白、干练的玄学运势顾问。不要讲复杂术语，只给最直接的能量建议。

今天是 ${TODAY}（${WEEKDAY_CN}）。

请根据今天日期，生成一段每日能量提醒。

规则：
1. 如果是星期一、星期三、星期五：请给一句核心启示，并加入“王老师点评”。
2. 如果是其他日期：请直接输出“能量避坑指南”。
3. 总字数控制在150字以内。
4. 不要解释，不要多余开场白。
5. 严格按照以下格式输出：

📅 ${TODAY} (${WEEKDAY_CN}) | 每日能量提醒

✨ 今日核心启示 ：
[内容]

🎯 今日宜做 ：
• [动作1]
• [动作2]

⚠️ 今日避坑 ：
• [动作1]
• [动作2]

🔢 今日幸运磁场 ：
• 数字：[数字]
• 颜色：[颜色]
• 旺生肖：[生肖]

---
🔗 想一对一算运势？点击咨询王老师：
👉 https://wa.me/60167272735"

          echo "Calling OpenAI..."

          RESPONSE=$(curl -sS https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "user",
                  content: $prompt
                }
              ],
              temperature: 0.8
            }')")

          echo "$RESPONSE"

          MESSAGE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ "$MESSAGE" = "null" ] || [ -z "$MESSAGE" ]; then
            echo "OpenAI did not return message"
            exit 1
          fi

          echo "Sending Telegram..."

          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
