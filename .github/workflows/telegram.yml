name: Daily Energy Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Test Message
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=📅 每日能量提醒测试成功"
