name: Daily Energy Reminder

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send Daily Energy Reminder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          TODAY=$(TZ="Asia/Kuala_Lumpur" date +"%Y年%-m月%-d日")

          MESSAGE=$'📅 '"${TODAY}"$' | 每日能量提醒\n\n✨ 今日核心启示 ：\n能量避坑指南：今天少说多做，别急着解释，行动比争辩更有力量。\n\n🎯 今日宜做 ：\n• 整理手上任务\n• 主动跟进客户\n\n⚠️ 今日避坑 ：\n• 情绪化回复\n• 临时乱改计划\n\n🔢 今日幸运磁场 ：\n• 数字：8\n• 颜色：金色\n• 旺生肖：龙、猴\n\n---\n🔗 想一对一算运势？点击咨询王老师：\n👉 https://wa.me/60167272735'

          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
